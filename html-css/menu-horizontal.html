<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        .navbar {
            display: flex;
            align-items: center;
            background-color: #f0f0f0;
            padding: 10px 20px;
            font-family: sans-serif;
        }

        .logo {
            background-color: #ccc;
            padding: 10px;
            margin-right: 20px;
        }

        .menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            flex: 1; 
        }

        .menu li {
            margin-right: 20px;
        }

        .menu a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        .login {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">70 x 50</div>
        
        <ul class="menu">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Cursos</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>

        <button class="login">Login</button>
    </nav>

</body>
</html>
