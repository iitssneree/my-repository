<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Datos Recibidos</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e8f5e9;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .dato {
            color: #2e7d32;
            font-weight: bold;
            font-size: 1.2em;
        }

        .btn-volver {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            border: 1px solid #ccc;
            padding: 5px 15px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>✅ Envío Exitoso</h1>
        <p>Has ingresado como: <br><span id="user-display" class="dato">...</span></p>
        <p>Tu clave (shhh!): <br><span id="pass-display" class="dato">...</span></p>

        <a href="index.html" class="btn-volver">← Volver a intentar</a>
    </div>

    <script>
        // Capturamos los datos que vienen en la URL (?usuario=...&password=...)
        const urlParams = new URLSearchParams(window.location.search);

        const user = urlParams.get('usuario');
        const pass = urlParams.get('password');

        // Los mostramos en los elementos correspondientes
        document.getElementById('user-display').innerText = user || 'Vacio';
        document.getElementById('pass-display').innerText = pass || 'Vacia';
    </script>

</body>

</html>
