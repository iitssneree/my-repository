<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes</title>
</head>

<body>
    <h2>Incluir imágenes desde la web.</h2>

    <div style="display: inline-block; vertical-align: top;">
        <img src="Imágen gato 1.JPG" alt="Gato gris">
    </div>

    <div style="display: inline-block; vertical-align: top;">
        <img src="Imágen gato 2.jpg" alt="Gato siamés" style="width: 150px;">
    </div>

    <hr>

    <h3>Incluir imágenes desde el propio dominio de la página.</h3>

    <div style="display: inline-block; vertical-align: top;">
        <img src="Imágen gato 1.JPG" alt="Gato gris local">
    </div>

    <div style="display: inline-block; vertical-align: top;">
        <img src="Imágen gato 2.jpg" alt="Gato siamés local" style="width: 150px;">
    </div>

    <style>
        img {
            max-width: 300px;
            max-height: 300px;
        }
    </style>

</body>
</html>
