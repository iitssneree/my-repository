<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablas HTML + CSS</title>
    <link rel="stylesheet" href="tabla-yoga.css">
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Hora</th>
                <th>Lunes</th>
                <th>Martes</th>
                <th>Miércoles</th>
                <th>Jueves</th>
                <th>Viernes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>08:00</td>
                <td colspan="5">Desayuno</td>
            </tr>
            <tr>
                <td>10:00</td>
                <td>Yoga</td>
                <td colspan="3">Paseo por el parque</td>
                <td>Compras</td>
            </tr>
            <tr>
                <td>12:00</td>
                <td rowspan="2">Comida con amigos</td>
                <td>Trabajo</td>
                <td>Trabajo</td>
                <td>Amigos</td>
                <td></td>
            </tr>
            <tr>
                <td>14:00</td>
                <td colspan="4">Comida en casa</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
