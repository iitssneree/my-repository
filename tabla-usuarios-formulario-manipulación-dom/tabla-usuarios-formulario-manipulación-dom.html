<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        h2 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .container { max-width: 600px; margin: auto; }
        form { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lista de Usuarios</h2>
    
    <table id="tablaUsuarios">
        <thead>
            <tr>
                <th>Nerea</th>
                <th>Gago Martín</th>
                <th>nereagago18.2@gmail.com</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana</td>
                <td>García</td>
                <td>ana@example.com</td>
            </tr>
            <tr>
                <td>Luis</td>
                <td>Rodríguez</td>
                <td>luis@example.com</td>
            </tr>
        </tbody>
    </table>

    <hr>

    <h3>Añadir Nuevo Usuario</h3>
    <form id="formularioUsuario">
        <div class="input-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required>
        </div>
        <div class="input-group">
            <label for="apellido">Apellidos:</label>
            <input type="text" id="apellido" required>
        </div>
        <div class="input-group">
            <label for="email">Correo:</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit">Agregar a la tabla</button>
    </form>
</div>

<script>
    // Referencias a los elementos del DOM
    const form = document.getElementById('formularioUsuario');
    const tablaBody = document.querySelector('#tablaUsuarios tbody');

    // Escuchar el evento de envío (submit)
    form.addEventListener('submit', function(event) {
        // Evitar que la página se recargue
        event.preventDefault();

        // Capturar los valores de los inputs
        const nombre = document.getElementById('nombre').value;
        const apellido = document.getElementById('apellido').value;
        const email = document.getElementById('email').value;

        // Crear una nueva fila (tr)
        const nuevaFila = document.createElement('tr');

        // Insertar el contenido HTML en la fila
        nuevaFila.innerHTML = `
            <td>${nombre}</td>
            <td>${apellido}</td>
            <td>${email}</td>
        `;

        // Añadir la fila al final del cuerpo de la tabla
        tablaBody.appendChild(nuevaFila);

        // Limpiar el formulario para el siguiente usuario
        form.reset();
    });
</script>

</body>
</html>
