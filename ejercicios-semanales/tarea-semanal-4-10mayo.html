<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Grid Interactivo 10x10</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            background-color: #f0f2f5;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 2px;
            background-color: #ccc;
            border: 2px solid #333;
            margin: 20px;
            outline: none;
        }

        .cell {
            width: 40px;
            height: 40px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .selected {
            background-color: #3498db !important;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .controls {
            margin-top: 10px;
            display: grid;
            grid-template-areas:
                ". up ."
                "left down right";
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid #999;
            background: white;
            border-radius: 4px;
        }

        button:active {
            background: #ddd;
        }

        .up {
            grid-area: up;
        }

        .left {
            grid-area: left;
        }

        .down {
            grid-area: down;
        }

        .right {
            grid-area: right;
        }
    </style>
</head>

<body onkeydown="handleKeyPress(event)">

    <h2>Grid Interactivo 10x10</h2>
    <p>Usa los botones, las flechas del teclado o haz clic en las celdas.</p>

    <div id="grid-container" tabindex="0"></div>

    <div class="controls">
        <button class="up" onclick="move('up')">↑</button>
        <button class="left" onclick="move('left')">←</button>
        <button class="down" onclick="move('down')">↓</button>
        <button class="right" onclick="move('right')">→</button>
    </div>

    <script>
        const gridSize = 10;
        let selectedRow = 0;
        let selectedCol = 0;

        const gridContainer = document.getElementById('grid-container');

        function createGrid() {
            gridContainer.innerHTML = '';
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = `cell-${r}-${c}`;

                    cell.onclick = () => selectCell(r, c);

                    gridContainer.appendChild(cell);
                }
            }
            updateVisuals();
        }

        function updateVisuals() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));

            const activeCell = document.getElementById(`cell-${selectedRow}-${selectedCol}`);
            if (activeCell) activeCell.classList.add('selected');
        }

        function move(direction) {
            let newRow = selectedRow;
            let newCol = selectedCol;

            if (direction === 'up') newRow--;
            if (direction === 'down') newRow++;
            if (direction === 'left') newCol--;
            if (direction === 'right') newCol++;

            if (newRow >= 0 && newRow < gridSize && newCol >= 0 && newCol < gridSize) {
                selectedRow = newRow;
                selectedCol = newCol;
                updateVisuals();
            } else {
                console.log("Movimiento fuera de límites");
            }
        }

        function selectCell(r, c) {
            selectedRow = r;
            selectedCol = c;
            updateVisuals();
        }

        function handleKeyPress(event) {
            switch (event.key) {
                case "ArrowUp": move('up'); break;
                case "ArrowDown": move('down'); break;
                case "ArrowLeft": move('left'); break;
                case "ArrowRight": move('right'); break;
            }
        }

        createGrid();
    </script>
</body>

</html>
